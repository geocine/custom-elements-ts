<!doctype html>
<html lang="en">
  <head>
    <base href="/" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#0a0c10" />
    <title>Counter — custom-elements-ts demo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap"
    />

    <style>
      :root {
        --bg: #0a0c10;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: var(--bg);
        color: #e6ecf3;
      }

      body {
        position: relative;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 32px 24px;
        background:
          radial-gradient(60% 50% at 50% -10%, rgba(49, 120, 198, 0.18) 0%, transparent 60%),
          radial-gradient(40% 40% at 50% 110%, rgba(49, 120, 198, 0.1) 0%, transparent 60%),
          var(--bg);
        font-family:
          'Geist',
          'Inter',
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 0%, transparent 75%);
        -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 0%, transparent 75%);
        z-index: 0;
      }

      .stage {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 22px;
        justify-items: center;
      }

      .corner {
        position: fixed;
        top: 24px;
        left: 24px;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #97a1ad;
        font-family:
          'Geist Mono', 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-decoration: none;
      }

      .corner svg {
        color: #3178c6;
      }

      .corner:hover {
        color: #e6ecf3;
      }

      .caption {
        max-width: 320px;
        margin: 0;
        color: #5b6370;
        font-size: 12px;
        line-height: 1.55;
        text-align: center;
        text-wrap: balance;
      }

      .caption code {
        padding: 1px 5px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.02);
        color: #97a1ad;
        font-family:
          'Geist Mono', 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
      }

      .observer {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 0 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.02);
        color: #97a1ad;
        font-family:
          'Geist Mono', 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        letter-spacing: 0.02em;
      }

      .observer output {
        color: #9cc0eb;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      cts-counter {
        position: relative;
        z-index: 1;
      }

      @media (max-width: 380px) {
        .corner {
          top: 16px;
          left: 16px;
        }
      }
    </style>
  </head>
  <body>
    <a class="corner" href="https://github.com/geocine/custom-elements-ts">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.25"
        stroke-linecap="round"
        stroke-linejoin="round"
        width="14"
        height="14"
        aria-hidden="true"
      >
        <path d="M8.5 7.5 4 12l4.5 4.5" />
        <path d="M15.5 7.5 20 12l-4.5 4.5" />
        <path d="M14 5l-4 14" />
      </svg>
      custom-elements-ts · counter demo
    </a>

    <div class="stage">
      <cts-counter></cts-counter>
      <div class="observer" aria-live="polite">
        <span>counter.change</span>
        <output id="counter-signal">0</output>
      </div>
      <p class="caption">
        Click the card. The element owns <code>@State()</code> and emits
        <code>counter.change</code> for outside consumers.
      </p>
    </div>

    <script src="node_modules/@webcomponents/custom-elements/src/native-shim.js"></script>
    <script src="node_modules/@webcomponents/custom-elements/custom-elements.min.js"></script>
    <script src="counter.umd.js"></script>
    <script>
      const counter = document.querySelector('cts-counter');
      const signal = document.querySelector('#counter-signal');

      counter.addEventListener('counter.change', (event) => {
        signal.value = event.detail.count;
      });
    </script>
  </body>
</html>
<!-- livereload -->
